<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>BEM_Task</title>
  </head>
  <body>
    <section class="pricing">
      <div class="pricing__container">
        <h1 class="pricing__title">YouTube Premium - 1442</h1>
        <div class="pricing__cards">
          <div class="card">
            <h2 class="card__title">Music</h2>
            <div class="card__divider"></div>
            <ul class="card__features">
              <li class="card__feature">
                <span class="card__icon"></span>
                <span class="card__text">
                  Listen to music without ads, in the background and offline
                </span>
              </li>
            </ul>
            <div class="card__price">$60</div>
            <button class="card__button card__button--primary">
              Get started
            </button>
          </div>
          <div class="card">
            <h2 class="card__title">Premium</h2>
            <div class="card__divider"></div>
            <ul class="card__features">
              <li class="card__feature">
                <span class="card__icon"></span>
                <span class="card__text">
                  YouTube and YouTube Music without ads, in the background and
                  offline
                </span>
              </li>
            </ul>
            <div class="card__price">$80</div>
            <button class="card__button card__button--dark">Get started</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
